<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>重力値取得ツール（住所自動検索版）</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    input[type="text"] { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
    button { padding: 8px 16px; cursor: pointer; margin-right: 5px; margin-bottom: 10px; }
    .result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
    .loading { color: #666; font-size: 0.9em; display: none; }
    .warning-text { margin-top: 20px; font-size: 0.9em; color: #d9534f; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <h2>国土地理院重力値取得ツール</h2>
    
    <label for="addressInput">住所:</label>
    <input type="text" id="addressInput" placeholder="例: 北海道札幌市中央区北1条西2丁目">
    
    <button onclick="getGravityByAddress()">重力値を取得</button>
    <button onclick="clearFields()">クリア</button>
    <!-- 追加したリンクボタン -->
    <button onclick="window.open('https://vldb.gsi.go.jp/sokuchi/gsigra/calc/', '_blank')">国土地理院重力値検索サイト</button>
    
    <div id="statusMessage" class="loading">検索中...少々お待ちください</div>

    <div class="result" id="resultArea">
      <p>検索地点: <span id="resAddress">-</span></p>
      <p>重力値 (Gravity): <span id="resGravity">-</span></p>
      <p>緯度 (Lat): <span id="resLat">-</span></p>
      <p>経度 (Lon): <span id="resLon">-</span></p>
      <p>標高 (H): <span id="resH">-</span></p>
    </div>

    <!-- 注意書きをコンテナの中に移動し、少しスタイルを当てました -->
    <div class="warning-text">
      <p>※「重力値を取得」ボタンをクリックした際、「検索地点：」に市町村名までしか表示されない場合は、詳細な所在地が国土地理院のデータなく
、表示された重力値に誤差が生じている恐れがありますので、お手数ですが国土地理院のウェブサイトにて直接ご確認ください。</p>
      
    </div>
  </div>
  
  <script>
    async function getGravityByAddress() {
      const address = document.getElementById('addressInput').value;
      const statusMsg = document.getElementById('statusMessage');

      if (!address) {
        alert('住所を入力してください。');
        return;
      }

      statusMsg.style.display = 'block';
      statusMsg.textContent = '住所から緯度経度を検索中...';

      try {
        // 1. 国土地理院の住所検索APIで、住所から緯度経度を取得
        const geoUrl = `https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(address)}`;
        const geoResponse = await fetch(geoUrl);
        const geoData = await geoResponse.json();

        if (!geoData || geoData.length === 0) {
          alert('該当する住所や施設が見つかりませんでした。別の表記でお試しください。');
          statusMsg.style.display = 'none';
          return;
        }

        // 検索結果の1件目を利用
        // ※国土地理院APIは [経度, 緯度] の順番で返してくるので注意
        const lon = geoData[0].geometry.coordinates[0];
        const lat = geoData[0].geometry.coordinates[1];
        const matchTitle = geoData[0].properties.title;

        document.getElementById('resAddress').textContent = matchTitle;
        statusMsg.textContent = '重力値を計算中...';

        // 2. Vercelの自作API（中継API）へ緯度経度を渡して重力値を取得
        const gravResponse = await fetch(`/api/gravity?lat=${lat}&lon=${lon}`);
        const gravData = await gravResponse.json();

        if (gravData && gravData.CalcResult) {
          document.getElementById('resGravity').textContent = gravData.CalcResult.Gravity;
          document.getElementById('resLat').textContent = gravData.CalcResult.Lat_deg;
          document.getElementById('resLon').textContent = gravData.CalcResult.Lon_deg;
          document.getElementById('resH').textContent = gravData.CalcResult.H;
          statusMsg.textContent = '取得完了しました！';
        } else {
          alert('重力値APIから正しいデータが返却されませんでした。');
          statusMsg.style.display = 'none';
        }
      } catch (error) {
        alert('通信エラーが発生しました。');
        console.error(error);
        statusMsg.style.display = 'none';
      }
    }

    function clearFields() {
      document.getElementById('addressInput').value = '';
      document.getElementById('resAddress').textContent = '-';
      document.getElementById('resGravity').textContent = '-';
      document.getElementById('resLat').textContent = '-';
      document.getElementById('resLon').textContent = '-';
      document.getElementById('resH').textContent = '-';
      document.getElementById('statusMessage').style.display = 'none';
    }
  </script>
</body>
</html>
